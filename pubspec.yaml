name: todo_caserito
description: "Tortas artesanales a pedido en Hurlingham, Buenos Aires. Balcarce, Chajá, Cheesecake, Lemon Pie y más. Entrega a domicilio en el GBA Oeste. ¡Pedí por WhatsApp!"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  url_launcher: ^6.3.0
  quarks_footer:
    git:
      url: https://github.com/Quarks-Studio/quarks_footer.git
      ref: v1.2.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  flutter_web_plugins:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: "^0.14.4"
  flutter_lints: ^6.0.0

flutter_launcher_icons:
  image_path: "assets/images/og_image.jpg"
  web:
    generate: true
    image_path: "assets/images/og_image.jpg"
    background_color: "#FAF8F3"
    theme_color: "#C8472B"

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/images/
    - assets/images/gallery/
    - assets/images/certificates/
